<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Vimbatech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #1E4F3A 0%, #2a6651 50%, #1a4232 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-heritage-100 rounded-2xl mb-4">
                <i data-lucide="shield-check" class="w-10 h-10 text-heritage-700"></i>
            </div>
            <h1 class="text-3xl font-bold text-heritage-700 mb-2">Join Vimbatech</h1>
            <p class="text-gray-600">Start protecting your SACCO today</p>
        </div>

        <form action="/signup" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">SACCO Name</label>
                <div class="relative">
                    <i data-lucide="building" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="text" name="sacco_name" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-heritage-500 focus:border-heritage-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Your Name</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="text" name="full_name" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-heritage-500 focus:border-heritage-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="email" name="email" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-heritage-500 focus:border-heritage-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                <div class="relative">
                    <i data-lucide="phone" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="tel" name="phone" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-heritage-500 focus:border-heritage-500"
                        placeholder="07XX XXX XXX">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="password" name="password" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-heritage-500 focus:border-heritage-500">
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="terms" name="terms" required class="mr-2">
                <label for="terms" class="text-sm text-gray-600">
                    I agree to the <a href="#" class="text-heritage-700 hover:underline">Terms & Conditions</a>
                </label>
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-heritage-700 to-heritage-600 text-white font-semibold py-3 rounded-lg hover:from-heritage-800 hover:to-heritage-700 transition">
                Create Account - KES 15,000/month
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-600 text-sm">
                Already have an account? 
                <a href="/login" class="text-heritage-700 font-semibold hover:underline">Sign in</a>
            </p>
        </div>

        <div class="mt-6 p-4 bg-heritage-50 rounded-lg">
            <p class="text-xs text-heritage-700 text-center">
                <i data-lucide="check-circle" class="w-4 h-4 inline mr-1"></i>
                14-day free trial • Cancel anytime • 24/7 support
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
